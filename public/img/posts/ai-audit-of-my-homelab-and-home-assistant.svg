<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300" role="img" aria-label="Homelab topology: phone over Tailscale to Proxmox host and Raspberry Pis, plus Home Assistant stats">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#46e39a"/></marker>
    <style>
      .box{fill:#10151c;stroke:#1c2530;stroke-width:1;}
      .acc{fill:#0f1a17;stroke:#46e39a;stroke-width:1.3;}
      .t{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#e6ece8;font-size:13px;font-weight:600;}
      .s{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#6d7d82;font-size:10px;}
      .big{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#46e39a;font-size:20px;font-weight:700;}
      .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#46e39a;font-size:11px;letter-spacing:1px;}
      .cap{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#58d6ff;font-size:10px;}
      .flow{stroke:#46e39a;stroke-width:1.4;fill:none;}
    </style>
  </defs>
  <rect x="1" y="1" width="758" height="298" rx="12" fill="#0b1116" stroke="#1c2530"/>
  <text class="lbl" x="22" y="30">// WHAT AN AI FOUND IN MY HOMELAB</text>

  <rect class="box" x="22" y="120" width="120" height="56" rx="8"/>
  <text class="t" x="82" y="145" text-anchor="middle">phone</text>
  <text class="s" x="82" y="162" text-anchor="middle">off-network</text>

  <rect class="acc" x="250" y="70" width="200" height="70" rx="8"/>
  <text class="t" x="350" y="97" text-anchor="middle">Proxmox host</text>
  <text class="s" x="350" y="114" text-anchor="middle">LXC containers + VMs</text>
  <text class="s" x="350" y="129" text-anchor="middle">the core of the lab</text>

  <rect class="box" x="250" y="158" width="200" height="52" rx="8"/>
  <text class="t" x="350" y="181" text-anchor="middle">Raspberry Pis</text>
  <text class="s" x="350" y="198" text-anchor="middle">edge / always-on jobs</text>

  <rect class="box" x="250" y="228" width="200" height="46" rx="8"/>
  <text class="t" x="350" y="256" text-anchor="middle" style="font-size:12px">UniFi network + DNS</text>

  <rect class="box" x="520" y="90" width="218" height="150" rx="9"/>
  <text class="s" x="540" y="116">Home Assistant</text>
  <text class="big" x="540" y="146">900+ entities</text>
  <text class="s" x="540" y="170">across 29 domains</text>
  <text class="t" x="540" y="198" style="font-size:14px">9 rooms · 2 floors</text>
  <text class="s" x="540" y="218">Zigbee · Hue · doorbell · add-ons</text>

  <path class="flow" marker-end="url(#ah)" d="M142,140 C190,132 210,115 246,108"/>
  <text class="s" x="150" y="120">Tailscale</text>
  <path class="flow" marker-end="url(#ah)" d="M450,110 L516,140" opacity="0.8"/>

  <text class="cap" x="22" y="288">one prompt, full read access over MCP — the audit wrote itself</text>
</svg>
