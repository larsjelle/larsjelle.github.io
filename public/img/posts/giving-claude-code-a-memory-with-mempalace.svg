<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300" role="img" aria-label="Claude Code to MemPalace MCP to local palace store">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#46e39a"/></marker>
    <style>
      .box{fill:#10151c;stroke:#1c2530;stroke-width:1;}
      .acc{fill:#0f1a17;stroke:#46e39a;stroke-width:1.3;}
      .t{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#e6ece8;font-size:14px;font-weight:600;}
      .s{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#6d7d82;font-size:10.5px;}
      .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#46e39a;font-size:11px;letter-spacing:1px;}
      .cap{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#58d6ff;font-size:10px;}
      .flow{stroke:#46e39a;stroke-width:1.4;fill:none;}
      .dash{stroke:#6d7d82;stroke-width:1.2;fill:none;stroke-dasharray:4 4;}
    </style>
  </defs>
  <rect x="1" y="1" width="758" height="298" rx="12" fill="#0b1116" stroke="#1c2530"/>
  <text class="lbl" x="22" y="30">// PERSISTENT MEMORY FOR CLAUDE</text>

  <rect class="box" x="270" y="44" width="220" height="46" rx="8"/>
  <text class="t" x="380" y="65" text-anchor="middle">~/.claude/projects</text>
  <text class="s" x="380" y="81" text-anchor="middle">past conversation logs</text>

  <rect class="acc" x="22" y="140" width="150" height="64" rx="8"/>
  <text class="t" x="97" y="167" text-anchor="middle">Claude Code</text>
  <text class="s" x="97" y="184" text-anchor="middle">terminal agent</text>

  <rect class="box" x="300" y="136" width="160" height="72" rx="8"/>
  <text class="t" x="380" y="163" text-anchor="middle">MemPalace</text>
  <text class="s" x="380" y="180" text-anchor="middle">MCP server</text>
  <text class="s" x="380" y="195" text-anchor="middle">~19 tools</text>

  <rect class="box" x="580" y="136" width="158" height="72" rx="8"/>
  <text class="t" x="659" y="160" text-anchor="middle">Palace store</text>
  <text class="s" x="659" y="177" text-anchor="middle">SQLite + vectors</text>
  <text class="s" x="659" y="192" text-anchor="middle">wings→rooms→drawers</text>

  <rect class="box" x="300" y="238" width="160" height="40" rx="8"/>
  <text class="t" x="380" y="263" text-anchor="middle" style="font-size:12px">CLAUDE.md rules</text>

  <path class="flow" marker-end="url(#ah)" d="M380,90 L380,132"/>
  <text class="s" x="398" y="118">mine (seed)</text>
  <path class="flow" marker-end="url(#ah)" d="M172,168 L296,168"/>
  <path class="flow" marker-end="url(#ah)" d="M300,180 L176,180" opacity="0.5"/>
  <path class="flow" marker-end="url(#ah)" d="M460,172 L576,172"/>
  <path class="dash" marker-end="url(#ah)" d="M300,258 C180,258 97,240 97,208"/>
  <text class="s" x="150" y="252">governs</text>

  <text class="cap" x="22" y="290">local · offline · no API key</text>
</svg>
