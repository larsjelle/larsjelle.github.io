<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320" role="img" aria-label="Claude Code with MCP servers and Agent of Empires multiplexer">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#46e39a"/></marker>
    <style>
      .box{fill:#10151c;stroke:#1c2530;stroke-width:1;}
      .acc{fill:#0f1a17;stroke:#46e39a;stroke-width:1.3;}
      .cy{fill:#0d1720;stroke:#58d6ff;stroke-width:1.2;}
      .t{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#e6ece8;font-size:14px;font-weight:600;}
      .s{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#6d7d82;font-size:10.5px;}
      .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#46e39a;font-size:11px;letter-spacing:1px;}
      .cap{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#58d6ff;font-size:10px;}
      .flow{stroke:#46e39a;stroke-width:1.4;fill:none;}
      .flowc{stroke:#58d6ff;stroke-width:1.4;fill:none;}
    </style>
  </defs>
  <rect x="1" y="1" width="758" height="318" rx="12" fill="#0b1116" stroke="#1c2530"/>
  <text class="lbl" x="22" y="30">// TERMINAL-FIRST AI STACK</text>

  <rect class="cy" x="270" y="44" width="220" height="50" rx="8"/>
  <text class="t" x="380" y="66" text-anchor="middle">Agent of Empires · tmux</text>
  <text class="s" x="380" y="83" text-anchor="middle">multiplexes N Claude sessions</text>

  <rect class="acc" x="290" y="140" width="180" height="60" rx="8"/>
  <text class="t" x="380" y="166" text-anchor="middle">Claude Code</text>
  <text class="s" x="380" y="183" text-anchor="middle">the workhorse agent</text>

  <rect class="box" x="30" y="140" width="180" height="60" rx="8"/>
  <text class="t" x="120" y="166" text-anchor="middle">MCP servers</text>
  <text class="s" x="120" y="183" text-anchor="middle">typed tool access</text>

  <rect class="box" x="30" y="238" width="180" height="52" rx="8"/>
  <text class="t" x="120" y="261" text-anchor="middle" style="font-size:12px">HA · n8n · Playwright</text>
  <text class="s" x="120" y="278" text-anchor="middle">real self-hosted systems</text>

  <rect class="box" x="550" y="140" width="180" height="60" rx="8"/>
  <text class="t" x="640" y="166" text-anchor="middle">web dashboard</text>
  <text class="s" x="640" y="183" text-anchor="middle">over Tailscale</text>

  <rect class="box" x="550" y="238" width="180" height="52" rx="8"/>
  <text class="t" x="640" y="269" text-anchor="middle">phone</text>

  <path class="flowc" marker-end="url(#ah)" d="M380,94 L380,136"/>
  <path class="flow" marker-end="url(#ah)" d="M210,170 L286,170"/>
  <path class="flow" marker-end="url(#ah)" d="M120,200 L120,234"/>
  <path class="flowc" marker-end="url(#ah)" d="M470,170 L546,170"/>
  <path class="flowc" marker-end="url(#ah)" d="M640,200 L640,234"/>

  <text class="cap" x="22" y="308">drive it from a terminal — or my phone</text>
</svg>
