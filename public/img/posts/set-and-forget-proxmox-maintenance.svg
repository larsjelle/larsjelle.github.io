<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" width="760" height="260" role="img" aria-label="Three layers of automated Proxmox maintenance">
  <defs>
    <style>
      .box{fill:#10151c;stroke:#1c2530;stroke-width:1;}
      .acc{fill:#0f1a17;stroke:#46e39a;stroke-width:1.3;}
      .t{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#e6ece8;font-size:14px;font-weight:600;}
      .s{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#6d7d82;font-size:10.5px;}
      .n{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#46e39a;font-size:12px;font-weight:700;}
      .lbl{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#46e39a;font-size:11px;letter-spacing:1px;}
      .cap{font-family:ui-monospace,'JetBrains Mono',monospace;fill:#58d6ff;font-size:10px;}
    </style>
  </defs>
  <rect x="1" y="1" width="758" height="258" rx="12" fill="#0b1116" stroke="#1c2530"/>
  <text class="lbl" x="22" y="30">// A PROXMOX BOX THAT MAINTAINS ITSELF</text>

  <rect class="acc" x="22" y="58" width="230" height="150" rx="9"/>
  <text class="n" x="40" y="86">01</text>
  <text class="t" x="40" y="112">unattended-upgrades</text>
  <text class="s" x="40" y="134">patches the Debian /</text>
  <text class="s" x="40" y="150">Proxmox host</text>
  <text class="s" x="40" y="180">runs on its own,</text>
  <text class="s" x="40" y="196">no hands</text>

  <rect class="acc" x="266" y="58" width="230" height="150" rx="9"/>
  <text class="n" x="284" y="86">02</text>
  <text class="t" x="284" y="112">systemd timer + script</text>
  <text class="s" x="284" y="134">pct exec apt/apk</text>
  <text class="s" x="284" y="150">upgrades across every</text>
  <text class="s" x="284" y="166">running LXC container</text>

  <rect class="acc" x="510" y="58" width="228" height="150" rx="9"/>
  <text class="n" x="528" y="86">03</text>
  <text class="t" x="528" y="112">vzdump (weekly)</text>
  <text class="s" x="528" y="134">backs up all guests +</text>
  <text class="s" x="528" y="150">tarballs host /etc,</text>
  <text class="s" x="528" y="166">dpkg selections,</text>
  <text class="s" x="528" y="182">/usr/local/sbin</text>

  <text class="cap" x="22" y="238">host + containers + backups — all on timers, nothing done by hand after month two</text>
</svg>
